<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="예약 명단 — JP Landing admin">예약 명단 — JP Landing admin</title>
    <style>
        :root {
            color-scheme: light;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, "Segoe UI", "Noto Sans JP", sans-serif;
            background: #f3f5f8;
            color: #1a1c1f;
        }

        .rv-bar {
            position: sticky;
            top: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 18px;
            background: #1a1c1f;
            color: #fff;
            font-size: 13px;
        }

        .rv-bar b {
            font-family: system-ui, sans-serif;
            font-size: 13px;
        }

        .rv-bar .sp {
            flex: 1;
        }

        .rv-bar a,
        .rv-bar button,
        .rv-bar select {
            font: inherit;
            cursor: pointer;
            border: 0;
            border-radius: 8px;
            padding: 9px 14px;
            background: #3a3d42;
            color: #fff;
            font-weight: 600;
            text-decoration: none;
        }

        .rv-bar select option {
            color: #1a1c1f;
            background: #fff;
        }

        .rv-bar a.home {
            background: #2f6df0;
            margin-right: 8px;
        }

        .rv-wrap {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 18px 60px;
        }

        .rv-head {
            display: flex;
            align-items: flex-end;
            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .rv-head h1 {
            font-size: 22px;
            margin: 0;
        }

        .rv-stats {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 4px 0 18px;
        }

        .rv-stat {
            background: #fff;
            border-radius: 12px;
            padding: 12px 18px;
            box-shadow: 0 2px 10px rgba(0, 0, 0, .05);
        }

        .rv-stat .n {
            font-size: 22px;
            font-weight: 800;
        }

        .rv-stat .l {
            font-size: 12px;
            color: #6b7077;
        }

        .rv-tools {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 14px;
            align-items: center;
        }

        .rv-tools input[type=search] {
            padding: 10px 14px;
            border: 1px solid #d8dadf;
            border-radius: 10px;
            font-size: 14px;
            min-width: 220px;
        }

        .rv-tools select {
            padding: 10px 12px;
            border: 1px solid #d8dadf;
            border-radius: 10px;
            font-size: 14px;
            background: #fff;
            color: #1a1c1f;
            cursor: pointer;
        }

        .rv-tools button {
            padding: 10px 16px;
            border: 0;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            background: #06c755;
            color: #fff;
        }

        .rv-tools button.danger {
            background: #e8553b;
        }

        table {
            width: 100%;
            table-layout: fixed;
            border-collapse: collapse;
            background: #fff;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 2px 14px rgba(0, 0, 0, .06);
        }

        th,
        td {
            padding: 12px 14px;
            text-align: left;
            font-size: 14px;
            border-bottom: 1px solid #eef0f3;
        }

        th {
            background: #fafbfc;
            font-size: 12px;
            color: #6b7077;
            text-transform: uppercase;
            letter-spacing: .03em;
        }

        tr{
            height: 54px;
        }

        tr:last-child td {
            border-bottom: 0;
        }

        .pill {
            display: inline-block;
            font-size: 12px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 999px;
        }

        .pill.use {
            background: #e6f7ee;
            color: #06a047;
        }

        .pill.no {
            background: #eef0f3;
            color: #6b7077;
        }

        .pill.pending {
            background: #fff4e0;
            color: #d98a00;
        }

        .cstat {
            font: inherit;
            cursor: pointer;
            border: 1px solid #d8dadf;
            background: #fff;
            color: #6b7077;
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 11px;
            font-weight: 700;
            transition: .12s;
        }

        .cstat:hover {
            border-color: #06c755;
            color: #06a047;
        }

        .cstat.done {
            background: #e6f7ee;
            color: #06a047;
            border-color: #bce8d1;
        }

        /* 쿠폰 사용 취소 / 되돌리기 버튼 */
        .cvoid {
            font: inherit;
            cursor: pointer;
            border: 1px solid #e3c0b8;
            background: #fff;
            color: #c0563b;
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 11px;
            font-weight: 700;
            transition: .12s;
        }

        .cvoid:hover {
            background: #fbeae6;
            border-color: #e8553b;
        }

        /* 예약 삭제 버튼 */
        .col-del {
            width: 70px;
            min-width: 70px;
            text-align: center;
            white-space: nowrap;
        }

        .rdel {
            font: inherit;
            cursor: pointer;
            border: 1px solid #e3c0b8;
            background: #fff;
            color: #c0563b;
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 11px;
            font-weight: 700;
            transition: .12s;
        }

        .rdel:hover {
            background: #fbeae6;
            border-color: #e8553b;
        }

        .col-contact {
            width: 200px;
            min-width: 200px;
        }

        .col-date {
            width: 170px;
            min-width: 170px;
        }

        .col-coupon{
            width: 180px;
            min-width: 180px;
            white-space: nowrap;
        }

        .col-code {
            width: 110px;
            min-width: 110px;
            white-space: nowrap;
        }

        .col-date span {
            display: block;
            white-space: nowrap;
        }

        .cstat-wrap {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .cstat-at {
            font-size: 11px;
            color: #9aa0a6;
        }

        .rv-note {
            background: #fff8ec;
            border: 1px solid #ffe2b0;
            color: #8a5a00;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 13px;
            line-height: 1.7;
            margin-bottom: 14px;
        }

        .rv-note b {
            color: #6b4500;
        }

        code.code {
            font-weight: 700;
            letter-spacing: 1px;
            font-size: 12px;
        }

        /* Kleam 지점명(弘大店 / 明洞店)은 작게·진한 회색으로 표시 */
        .hosp-branch {
            font-size: 10px;
            color: #64686e;
            margin-left: 2px;
            font-weight: 900;
        }

        .rv-empty {
            text-align: center;
            color: #9aa0a6;
            padding: 50px 0;
        }

        /* ログインゲート */
        .rv-gate {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(20, 24, 31, .6);
        }

        .rv-gate-box {
            position: relative;
            background: #fff;
            border-radius: 16px;
            padding: 32px 28px;
            width: min(90vw, 360px);
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .3);
        }

        .rv-gate-box .rv-gate-lang {
            position: absolute;
            top: 12px;
            right: 12px;
            width: auto;
            padding: 6px 12px;
            border: 1px solid #ddd;
            border-radius: 999px;
            background: #f4f5f7;
            color: #3a3d42;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .rv-gate-box h2 {
            margin: 0 0 6px;
            font-size: 20px;
        }

        .rv-gate-box p {
            font-size: 13px;
            color: #6b7077;
            margin: 0 0 18px;
        }

        .rv-gate-box input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            margin-bottom: 12px;
        }

        .rv-gate-box button {
            width: 100%;
            padding: 12px;
            border: 0;
            border-radius: 10px;
            background: #2f6df0;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }

        .rv-gate-err {
            color: #e8553b;
            font-size: 12px;
            min-height: 14px;
            margin: 10px 0 0;
        }

        .tab-sub {
            display: flex;
            gap: 8px;
            margin: 18px 0 10px;
        }

        .tab-sub button {
            padding: 8px 16px;
            border: 1px solid #d8dadf;
            background: #fff;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            color: #3a3d42;
        }

        .tab-sub button.on {
            background: #1a1c1f;
            color: #fff;
            border-color: #1a1c1f;
        }

        /* ===== 반응형 (모바일 대응) ===== */
        @media (max-width: 760px) {
            .rv-bar {
                flex-wrap: wrap;
                gap: 8px;
                padding: 8px 12px;
            }

            .rv-bar b {
                width: 100%;
            }

            .rv-bar .sp {
                display: none;
            }

            .rv-bar a,
            .rv-bar button,
            .rv-bar select {
                padding: 9px 12px;
                font-size: 13px;
            }

            /* 2번째 줄: 버튼들이 폭을 나눠 여유있게 */
            .rv-bar select#rv-lang {
                flex: 0 0 auto;
            }

            .rv-bar a.home {
                flex: 1;
                margin-right: 0;
                text-align: center;
            }

            .rv-bar #rv-logout {
                flex: 1;
            }

            .rv-wrap {
                padding: 16px 12px 48px;
            }

            .rv-head h1 {
                font-size: 19px;
            }

            /* 통계 카드: 가로 스크롤 → 2열 그리드 */
            .rv-stats {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }

            .rv-stat {
                padding: 10px 12px;
            }

            .rv-stat .n {
                font-size: 19px;
            }

            /* 검색/필터 도구: 전부 한 줄 폭으로 */
            .rv-tools {
                gap: 8px;
            }

            .rv-tools input[type=search],
            .rv-tools select,
            .rv-tools button {
                width: 100%;
                min-width: 0;
            }

            .rv-tools .sp {
                display: none;
            }

            /* 테이블 → 카드 형태로 변환 */
            table {
                background: transparent;
                box-shadow: none;
                border-radius: 0;
            }

            table,
            thead,
            tbody,
            th,
            td,
            tr {
                display: block;
            }

            thead {
                position: absolute;
                width: 1px;
                height: 1px;
                overflow: hidden;
                clip: rect(0 0 0 0);
                white-space: nowrap;
            }

            tr {
                height: auto;
                background: #fff;
                border-radius: 12px;
                box-shadow: 0 2px 10px rgba(0, 0, 0, .06);
                margin-bottom: 12px;
                padding: 6px 14px;
            }

            tr:last-child td {
                border-bottom: 1px solid #eef0f3;
            }

            tr td:last-child {
                border-bottom: 0;
            }

            td {
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 12px;
                width: auto !important;
                min-width: 0 !important;
                padding: 10px 0;
                text-align: right;
                white-space: normal;
            }

            td::before {
                content: attr(data-label);
                flex: 0 0 auto;
                font-size: 12px;
                font-weight: 700;
                color: #6b7077;
                text-align: left;
            }

            .col-date span {
                white-space: normal;
            }

            .cstat-wrap {
                flex-wrap: wrap;
                justify-content: flex-end;
            }
        }
    </style>
</head>

<body>
    <div class="rv-bar">
        <b data-i18n="📋 예약 명단">📋 예약 명단</b>
        <span class="sp"></span>
        <select id="rv-lang"></select>
        <a class="home" href="./admin.html" data-i18n="← 관리 메인">← 관리 메인</a>
        <button id="rv-logout" data-i18n="로그아웃">로그아웃</button>
    </div>

    <div class="rv-wrap" id="rv-app" hidden>
        <div class="rv-head">
            <h1 data-i18n="LINE 예약 명단">LINE 예약 명단</h1>
        </div>

        <div class="rv-stats" id="rv-stats"></div>

        <div class="tab-sub">
            <button data-tab="resv" class="on" data-i18n="예약 목록">예약 목록</button>
            <button data-tab="coupon" data-i18n="쿠폰 발급 현황">쿠폰 발급 현황</button>
        </div>

        <div class="rv-tools">
            <input type="search" id="rv-search" placeholder="이름·전화·병원으로 검색" data-i18n-ph="이름·전화·병원으로 검색">
            <select id="rv-hospital">
                <option value="" data-i18n="전체 병원">전체 병원</option>
            </select>
            <select id="rv-status">
                <option value="" data-i18n="연락 상태">연락 상태</option>
                <option value="미연락" data-i18n="미연락">미연락</option>
                <option value="통화완료" data-i18n="통화완료">통화완료</option>
            </select>
            <button id="rv-csv" data-i18n="CSV 다운로드">CSV 다운로드</button>
            <span class="sp" style="flex:1"></span>
            <button class="danger" id="rv-clear" data-i18n="전체 데이터 삭제">전체 데이터 삭제</button>
        </div>

        <div class="rv-note" data-i18n-html="rv-note-coupon">
            💡 <b>쿠폰은 LINE 연결 전까지 "사용 예정" 상태입니다.</b>
            손님이 폼에 쿠폰을 입력해도 바로 사용 처리되지 않습니다.<br>
            관리자가 LINE으로 연락·통화를 확인한 뒤 <b>"미연락" 버튼을 눌러 "✓ 통화완료"로 바꾸면</b>
            그때 쿠폰이 <b>실제 사용으로 확정</b>됩니다. <br>(통화완료를 취소하면 쿠폰은 다시 사용 가능 상태로 돌아갑니다.)
        </div>

        <div id="rv-table"></div>
    </div>

    <script src="./admin-i18n.js?v=3"></script>
    <script src="./coupon.js"></script>
    <script src="./reservations.js?v=7"></script>
</body>

</html>
